services:
  - type: web
    name: auth-app-premium
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: RAILS_MASTER_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: auth-db
          property: connectionString
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_PASS
        sync: false

databases:
  - name: auth-db
    plan: free
